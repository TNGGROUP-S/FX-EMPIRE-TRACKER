name: FX Empire Historical Scraper (One-Time)

on:
  workflow_dispatch:

jobs:
  historical-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r ${{ github.workspace }}/requirements.txt

      - name: Install Playwright and browser dependencies
        run: |
          pip install playwright
          playwright install chromium
          sudo apt-get install -y libasound2t64 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2

      - name: Run historical scraper
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python historical_scraper.py

      - name: Upload training JSON as artifact
        uses: actions/upload-artifact@v4
        with:
          name: historical-articles-training-data
          path: historical_articles.json
          retention-days: 90
