name: FX Empire Daily Scraper

on:
  schedule:
    - cron: '0 */4 * * *'  # Runs every 4 hours
  workflow_dispatch:         # Also allows manual trigger

jobs:
  daily-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r ${{ github.workspace }}/requirements.txt

      - name: Run daily scraper
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python daily_scraper.py

      - name: Commit updated JSON back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add historical_articles.json articles_christopher_lewis.json articles_james_hyerczyk.json articles_arslan_ali.json articles_bruce_powers.json articles_muhammad_umair.json articles_vladimir_zernov.json
          git diff --staged --quiet || git commit -m "🤖 Daily scrape: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
